name: Publish Stable Addon

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish Stable Addon
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Sync dist to addon
        run: node scripts/sync-dist.mjs

      - name: Build and Publish
        uses: home-assistant/builder@master
        with:
          args: |
            --amd64 \
            --aarch64 \
            --target addon \
            --image "{arch}-addon-luftuj" \
            --docker-hub "ghcr.io/luftuj-cz"
