name: Publish Stable Addon

on:
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Sync dist to addon
        run: node scripts/sync-dist.mjs

      - name: Extract version
        id: version
        run: |
          version=$(grep '^version:' addon/config.yaml | awk '{print $2}')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@master
        with:
          architectures: '["amd64", "aarch64"]'
          image-name: addon-luftuj
          registry-prefix: ghcr.io/luftuj-cz

      - name: Upload addon context
        uses: actions/upload-artifact@v4
        with:
          name: addon-context
          path: addon/

  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download addon context
        uses: actions/download-artifact@v4
        with:
          name: addon-context
          path: addon/

      - name: Build and push
        uses: home-assistant/builder/actions/build-image@master
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          version: ${{ needs.prepare.outputs.version }}
          context: addon
          push: "true"
          cosign: "false"
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.19

  publish:
    name: Publish manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@master
        with:
          architectures: '["amd64", "aarch64"]'
          image-name: addon-luftuj
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ghcr.io/luftuj-cz
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          cosign: "false"