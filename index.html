<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LUFTaTOR - Home Assistant Add-on for ventilation control" />

    <!-- Critical resource hints -->
    <link rel="dns-prefetch" href="http://localhost:8000" />

    <!-- Favicon and icons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <title>LUFTaTOR HASS Add-on</title>

    <script>
      (function () {
        try {
          const saved = window.localStorage.getItem("luftujha-color-scheme");
          if (saved === "dark" || saved === "light") {
            document.documentElement.setAttribute("data-mantine-color-scheme", saved);
          } else {
            document.documentElement.setAttribute("data-mantine-color-scheme", "dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
